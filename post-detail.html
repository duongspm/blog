<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang tải bài viết... | Duongg Blog</title>
    <link rel="stylesheet" href="assets/css/post-detail.css">
    <link rel="stylesheet" href="assets/common/common.css">
    <link rel="stylesheet" href="assets/css/top.css">

</head>

<body class="post-detail">
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>
    <header class="header" data-include="./inc/header.html" data-path="./"></header>

    <!-- Main Content -->
    <main class="detail-container">
        <article class="glass-card detail-post reveal active" id="postContent">
            <div class="loading-state">Đang kết nối với vũ trụ...</div>
        </article>

    </main>
    <section class="interaction-section">

        <!-- Form Bình luận -->
        <div class="glass-card comment-form">
            <h3>Bình luận</h3>
            <input type="text" id="commentName" placeholder="Tên của bạn...">
            <textarea id="commentText" rows="3" placeholder="Chia sẻ cảm nghĩ của bạn..."></textarea>
            <button id="btnSendComment" class="magnetic-btn mini">
                <span class="btn-text">Gửi bình luận</span>
            </button>
        </div>

        <!-- Danh sách bình luận -->
        <div id="commentList" class="comment-list">
            <!-- Bình luận động đổ vào đây -->
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="footer-logo">Duongg<span>.</span>Blog</div>
        <div class="footer-links">
            <a href="#">Facebook</a>
            <a href="#">Github</a>
            <a href="#">Contact</a>
        </div>
        <p style="opacity: 0.4; font-size: 0.8rem;">© 2026 By Duongg</p>
    </footer>
    <script src="assets/js/inc.js"></script>
    <script src="assets/js/top.js"></script>
    <script type="module" src="assets/js/mvc/postDetail.js"></script>
</body>

</html>
